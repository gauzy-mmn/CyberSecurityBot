
name: Build and Check CyberSecurityBot

# TRIGGER: Run this workflow on every push to any branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # Use the latest Ubuntu virtual machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your repository code onto the VM
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install .NET 6 SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # Step 3: Restore dependencies (not needed for this project
      # but good practice to include)
      - name: Restore dependencies
        run: dotnet restore

      # Step 4: Build the project
      # --no-restore = skip restoring again since we just did it
      # If your code has syntax errors, this step will FAIL
      # and you will see a red cross on the Actions tab
      - name: Build
        run: dotnet build --no-restore --configuration Release
